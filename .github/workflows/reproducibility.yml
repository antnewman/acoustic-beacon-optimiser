name: Reproducibility check

# Runs a short spherical-cap CMA-ES optimisation on a schedule and on
# demand. The resulting JSON is uploaded as a workflow artefact. This
# is a smoke test that the full scientific pipeline (mesh -> BEM ->
# TS -> IC -> CMA-ES) still produces a sensible optimum from main,
# not a replacement for the full production runs described in the
# paper and in notebooks/03 and 04.

on:
  schedule:
    # Every Monday at 07:00 UTC
    - cron: "0 7 * * 1"
  workflow_dispatch:
  pull_request:
    paths:
      - "src/abo/acoustics/**"
      - "src/abo/geometry/**"
      - "src/abo/optimisation/**"
      - "src/abo/biology/call_spectra.py"
      - ".github/workflows/reproducibility.yml"

jobs:
  run-cmaes:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run CMA-ES on spherical cap (short budget)
        run: |
          mkdir -p results
          abo optimise \
            --family spherical-cap \
            --call glossophaga \
            --area-max 0.008 \
            --max-evals 60 \
            --seed 42 \
            --output results/sc_optimum.json

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: sc_optimum_${{ github.run_id }}
          path: results/sc_optimum.json
          retention-days: 30
